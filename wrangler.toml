name = "pharospulse"
main = "src/index.js"
compatibility_date = "2024-01-01"

# KV Namespace — run `npx wrangler kv:namespace create UPTIME_KV` and paste the ID below
[[kv_namespaces]]
binding = "UPTIME_KV"
id = "3e2335bff5254fbba04b2f428303f935"

# Cron trigger: every 30 minutes
[triggers]
crons = ["*/30 * * * *"]

# For local dev, use .dev.vars for secrets (TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID)
